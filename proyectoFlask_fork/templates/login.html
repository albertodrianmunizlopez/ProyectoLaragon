<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MACUIN - Portal Interno | Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">

                <h2>MACUIN</h2>

                <p>Portal Interno</p>

            </div>

            

            <form action="/" method="POST" class="login-form">

                <div class="form-group">

                    <label for="email">Correo Electrónico</label>

                    <!-- El 'name' coincidirá con lo esperado en el backend Flask y luego FastAPI -->

                    <input type="email" id="email" name="email" placeholder="usuario@macuin.com" required autofocus>

                </div>

                

                <div class="form-group">

                    <label for="password">Contraseña</label>

                    <input type="password" id="password" name="password" placeholder="" required>

                </div>

                

                <button type="submit" class="btn-submit">Iniciar Sesión</button>

            </form>

            

            <div class="login-footer">

                <p>&copy; 2026 MACUIN Autopartes.<br>Uso exclusivo del personal interno.</p>

            </div>

        </div>

    </div>

</body>

</html>
